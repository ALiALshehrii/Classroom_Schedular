<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 130 412 155" fill="none">
  <defs>
    <linearGradient id="roomA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="roomB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="doorA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="doorB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- LEFT ROOM (crowded / red-tinted) -->
  <g filter="url(#shadow)" transform="translate(60, 140)">
    <!-- Room walls -->
    <rect x="0" y="20" width="140" height="110" rx="10" fill="url(#roomA)" stroke="#c084fc" stroke-width="1.5" opacity="0.85"/>
    <!-- Roof -->
    <polygon points="70,0 -8,28 148,28" fill="#4f46e5" opacity="0.6"/>
    <!-- Door -->
    <rect x="50" y="55" width="40" height="55" rx="4" fill="url(#doorA)"/>
    <circle cx="82" cy="82" r="3" fill="#fbbf24" opacity="0.9"/>
    <!-- Window -->
    <rect x="15" y="45" width="24" height="20" rx="3" fill="white" opacity="0.25"/>
    <line x1="27" y1="45" x2="27" y2="65" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="15" y1="55" x2="39" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
    <!-- Crowd dots (people) -->
    <circle cx="25" cy="100" r="5" fill="#fca5a5" opacity="0.7"/>
    <circle cx="40" cy="95" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="55" cy="102" r="5" fill="#fca5a5" opacity="0.7"/>
    <circle cx="70" cy="97" r="5" fill="#fca5a5" opacity="0.65"/>
    <circle cx="85" cy="103" r="5" fill="#fca5a5" opacity="0.7"/>
    <circle cx="100" cy="96" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="115" cy="101" r="5" fill="#fca5a5" opacity="0.7"/>
    <!-- X mark (unavailable) -->
    <g stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="108" y1="42" x2="128" y2="62"/>
      <line x1="128" y1="42" x2="108" y2="62"/>
    </g>
  </g>

  <!-- RIGHT ROOM (available / blue-tinted) -->
  <g filter="url(#shadow)" transform="translate(312, 140)">
    <!-- Room walls -->
    <rect x="0" y="20" width="140" height="110" rx="10" fill="url(#roomB)" stroke="#67e8f9" stroke-width="1.5" opacity="0.85"/>
    <!-- Roof -->
    <polygon points="70,0 -8,28 148,28" fill="#3b82f6" opacity="0.5"/>
    <!-- Door (open) -->
    <rect x="50" y="55" width="40" height="55" rx="4" fill="url(#doorB)"/>
    <circle cx="58" cy="82" r="3" fill="#fbbf24" opacity="0.9"/>
    <!-- Open door panel -->
    <path d="M50 55 L35 62 L35 117 L50 110 Z" fill="#818cf8" opacity="0.4"/>
    <!-- Window -->
    <rect x="97" y="45" width="24" height="20" rx="3" fill="white" opacity="0.25"/>
    <line x1="109" y1="45" x2="109" y2="65" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="97" y1="55" x2="121" y2="55" stroke="white" stroke-width="1" opacity="0.3"/>
    <!-- Checkmark (available) -->
    <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
      <polyline points="105,45 113,55 128,38"/>
    </g>
    <!-- Fewer people (spacious) -->
    <circle cx="75" cy="100" r="5" fill="#a5b4fc" opacity="0.6"/>
    <circle cx="95" cy="97" r="5" fill="#a5b4fc" opacity="0.5"/>
  </g>

  <!-- SWAP ARROWS (center) -->
  <g transform="translate(256, 220)">
    <!-- Top arrow (right) -->
    <path d="M-40,-18 C-10,-18 10,-18 35,-18" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <polygon points="35,-25 48,-18 35,-11" fill="#22d3ee" opacity="0.9"/>
    <!-- Glow on arrow -->
    <path d="M-40,-18 C-10,-18 10,-18 35,-18" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.3"/>

    <!-- Bottom arrow (left) -->
    <path d="M40,18 C10,18 -10,18 -35,18" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <polygon points="-35,25 -48,18 -35,11" fill="#ec4899" opacity="0.9"/>
    <path d="M40,18 C10,18 -10,18 -35,18" stroke="#ec4899" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.3"/>
  </g>

  <!-- Person silhouette walking (center, between arrows) -->
  <g transform="translate(248, 185)" opacity="0.75">
    <!-- Head -->
    <circle cx="8" cy="0" r="7" fill="#c4b5fd"/>
    <!-- Body -->
    <line x1="8" y1="7" x2="8" y2="24" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="0" y1="13" x2="16" y2="13" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="8" y1="24" x2="2" y2="34" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="24" x2="14" y2="34" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>