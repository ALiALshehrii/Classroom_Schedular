<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Digital Twin – Classroom Scheduler | CCIS IMSIU{% endblock %}</title>
  <meta name="description"
    content="Digital Twin Classroom Scheduling System – College of Computer and Information Sciences, Imam Muhammad Ibn Saud Islamic University" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

  {% block extra_head %}{% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg dt-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        Classroom Scheduler Prototype
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'rooms_view' %}active{% endif %}"
              href="{{ url_for('rooms_view') }}">Rooms</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'schedule_view' %}active{% endif %}"
              href="{{ url_for('schedule_view') }}">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'conflicts_view' %}active{% endif %}"
              href="{{ url_for('conflicts_view') }}">Conflicts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'simulation_view' %}active{% endif %}"
              href="{{ url_for('simulation_view') }}">Simulation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'recommendations_view' %}active{% endif %}"
              href="{{ url_for('recommendations_view') }}">Recommendations</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="dt-footer">
    2025 - Classroom Scheduler Prototype
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  {% block extra_scripts %}{% endblock %}
</body>

</html>
