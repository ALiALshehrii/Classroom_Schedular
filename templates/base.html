<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Digital Twin – Classroom Scheduler | CCIS IMSIU{% endblock %}</title>
  <meta name="description"
    content="Digital Twin Classroom Scheduling System – College of Computer and Information Sciences, Imam Muhammad Ibn Saud Islamic University" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

  {% block extra_head %}{% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg dt-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Classroom Scheduler Logo" height="40" class="d-inline-block align-text-top">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
              href="{{ url_for('index') }}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'rooms_view' %}active{% endif %}"
              href="{{ url_for('rooms_view') }}">Rooms</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'schedule_view' %}active{% endif %}"
              href="{{ url_for('schedule_view') }}">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'conflicts_view' %}active{% endif %}"
              href="{{ url_for('conflicts_view') }}">Conflicts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'simulation_view' %}active{% endif %}"
              href="{{ url_for('simulation_view') }}">Simulation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'recommendations_view' %}active{% endif %}"
              href="{{ url_for('recommendations_view') }}">Recommendations</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'schedule_assistant_view' %}active{% endif %}"
              href="{{ url_for('schedule_assistant_view') }}">Schedule Assistant</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'heatmap_view' %}active{% endif %}"
              href="{{ url_for('heatmap_view') }}">Heatmap</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'analytics_view' %}active{% endif %}"
              href="{{ url_for('analytics_view') }}">Analytics</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="dt-footer position-relative">
    <div class="position-absolute start-0 top-50 translate-middle-y ps-4">
      <button id="themeToggleBtn" class="btn btn-sm btn-outline-secondary footer-theme-btn">
        🌙 Dark
      </button>
    </div>
    2026 - Classroom Scheduler Prototype
    <div class="position-absolute end-0 top-50 translate-middle-y pe-4">
      <a href="{{ url_for('about_twin_view') }}"
        class="text-decoration-none {% if request.endpoint == 'about_twin_view' %}fw-bold text-dark{% endif %}"
        style="color: inherit;">About Twin</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script>
    const themeBtn = document.getElementById('themeToggleBtn');
    const htmlElem = document.documentElement;

    // Load theme from localStorage
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      htmlElem.setAttribute('data-bs-theme', 'dark');
      themeBtn.textContent = '☀️ Light';
    }

    themeBtn.addEventListener('click', () => {
      const isDark = htmlElem.getAttribute('data-bs-theme') === 'dark';
      if (isDark) {
        htmlElem.removeAttribute('data-bs-theme');
        localStorage.setItem('theme', 'light');
        themeBtn.textContent = '🌙 Dark';
      } else {
        htmlElem.setAttribute('data-bs-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        themeBtn.textContent = '☀️ Light';
      }
    });

    // Fix index.html specific elements when in dark mode (optional callback hook)
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.attributeName === 'data-bs-theme') {
          if (typeof window.onThemeChange === 'function') {
            window.onThemeChange(htmlElem.getAttribute('data-bs-theme') === 'dark');
          }
        }
      });
    });
    observer.observe(htmlElem, { attributes: true });
  </script>

  {% block extra_scripts %}{% endblock %}
</body>

</html>
